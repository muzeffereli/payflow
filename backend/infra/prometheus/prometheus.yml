global:
  scrape_interval: 15s      # How often to collect metrics
  evaluation_interval: 15s  # How often to evaluate alert rules

scrape_configs:

  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: order-service
    static_configs:
      - targets: ["order-service:8081"]

  - job_name: payment-service
    static_configs:
      - targets: ["payment-service:8082"]

  - job_name: wallet-service
    static_configs:
      - targets: ["wallet-service:8083"]

  - job_name: notification-service
    static_configs:
      - targets: ["notification-service:8084"]

  - job_name: fraud-service
    static_configs:
      - targets: ["fraud-service:8085"]

  - job_name: auth-service
    static_configs:
      - targets: ["auth-service:8086"]

  - job_name: product-service
    static_configs:
      - targets: ["product-service:8087"]

  - job_name: nats
    static_configs:
      - targets: ["nats:8222"]
